openapi: 3.0.3

info:
  title: Video Game Collection Database API
  description: API documentation for the Video Game Collection Database API
  version: 1.0.0

servers:
  - url: http://localhost:3000/api

tags:
  - name: Auth
  - name: Games
  - name: Platforms

paths:

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: user@example.com
              password: Password123!
      responses:
        '201':
          description: User created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: admin@example.com
              password: Password123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example:
                token: jwt.token.here
                user:
                  id: 2
                  email: admin@example.com
                  role: admin
        '401':
          $ref: '#/components/responses/Unauthorized'

  /games:
    get:
      tags: [Games]
      summary: Get all games
      security: []
      responses:
        '200':
          description: Games retrieved
          content:
            application/json:
              example:
                - id: 1
                  title: Persona 5 Royal
                  genre: JRPG
                  releaseYear: 2020
                  platforms:
                    - platform:
                        id: 25
                        name: PlayStation®4
                        manufacturer: Sony
                    - platform:
                        id: 29
                        name: Nintendo Switch™
                        manufacturer: Nintendo

    post:
      tags: [Games]
      summary: Create game (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Persona 5 Royal
              genre: JRPG
              releaseYear: 2020
              platformIds: [25, 26, 28, 29, 32, 33]
      responses:
        '201':
          description: Game created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /games/{id}:
    get:
      tags: [Games]
      summary: Get game by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Game retrieved
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Games]
      summary: Update game (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Persona 5 Royal
              genre: JRPG
              releaseYear: 2020
              platformIds: [25, 26, 28, 29, 32, 33]
      responses:
        '200':
          description: Game updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Games]
      summary: Delete game (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  /platforms:
    get:
      tags: [Platforms]
      summary: Get all platforms
      security: []
      responses:
        '200':
          description: Platforms retrieved
          content:
            application/json:
              example:
                - id: 29
                  name: Nintendo Switch™
                  manufacturer: Nintendo
                  releaseYear: 2017
                  games:
                    - game:
                        id: 3
                        title: 'The Legend of Zelda: Breath of the Wild'
                        releaseYear: 2017

    post:
      tags: [Platforms]
      summary: Create platform (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Steam Deck™
              manufacturer: Valve
              releaseYear: 2022
      responses:
        '201':
          description: Platform created
          content:
            application/json:
              example:
                id: 36
                name: Steam Deck™
                manufacturer: Valve
                releaseYear: 2022
                games: []

  /platforms/{id}:
    get:
      tags: [Platforms]
      summary: Get platform by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Platform retrieved
          content:
            application/json:
              example:
                id: 29
                name: Nintendo Switch™
                manufacturer: Nintendo
                releaseYear: 2017
                games: []

    put:
      tags: [Platforms]
      summary: Update platform (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Steam Deck OLED™
              manufacturer: Valve
              releaseYear: 2023
      responses:
        '200':
          description: Platform updated

    delete:
      tags: [Platforms]
      summary: Delete platform (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          example:
            error: Invalid request

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          example:
            error: Access token required

    Forbidden:
      description: Forbidden
      content:
        application/json:
          example:
            error: Admin access required

    NotFound:
      description: Not found
      content:
        application/json:
          example:
            error: Resource not found

    Conflict:
      description: Conflict
      content:
        application/json:
          example:
            error: Already exists